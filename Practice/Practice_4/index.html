<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Absolute Position Example</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image:
                linear-gradient(to right, #ddd 1px, transparent 1px),
                linear-gradient(to bottom, #ddd 1px, transparent 1px);
            background-size: 10px 10px;
            padding: 40px;
        }

        .container {
            position: relative;
            width: 300px;
            height: 200px;
            border: 2px solid black;
            background: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
        }

        .bottom-right {
            position: absolute;
            width: 60px;
            height: 40px;
            right: 10px;
            bottom: 10px;
            border: 2px solid black;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <h2>Absolute Position Example</h2>

    <div class="container">
        <div class="bottom-right">Bottom Right</div>
    </div>

    <p>Container: 300px * 200px = 30 * 20 grid squares</p>
    <p>Bottom Right box: 60px * 40px = 6 * 4 grid squares</p>
</body>

</html>
