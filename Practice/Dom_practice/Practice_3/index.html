<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="card" id="card">
        <h2 id="nameText">John</h2>
        <p id="bioText">Bio here</p>
        <ul id="hobbies"></ul>
    </div>

    <input id="nameInput" placeholder="Name">
    <input id="bioInput" placeholder="Bio">
    <button id="update" type="button">Update</button>

    <input id="hobbyInput" placeholder="Hobby">
    <button id="addHobby" type="button">Add Hobby</button>

    <button id="color" type="button">Change Color</button>
    <button id="reset" type="button">Reset</button>

    <script src="script.js"></script>
</body>

</html>
